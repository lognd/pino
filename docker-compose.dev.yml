# Local dev overlay: only Postgres + Redis run in containers. Backend and frontend
# run natively via their own Makefiles for hot reload -- see docs/design/11-deployment.md.
# Usage: docker compose -f docker-compose.dev.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: melpino
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: melpino
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_dev_data:
