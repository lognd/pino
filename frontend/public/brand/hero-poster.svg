<?xml version="1.0" encoding="UTF-8"?>
<!--
  Static hero poster BACKDROP (docs/design/08-landing-hero.md rungs 1/2/4):
  the first frame that paints, and the reduced-motion / pre-init / low-power
  fallback. It depicts the REST state of the scene (black field + vignette),
  NOT the shot: an earlier version baked the muzzle-flash light spill into
  this asset, which blinked a phantom flash on every first load when the
  live black rest frame replaced it. Revision 6: the lockup itself is NOT in
  this asset either; Hero.tsx overlays the inline Wordmark SVG in every mode
  (correct webfont, no <img>-context font fallback, no double print), so
  this file is pure field art. Strictly the doc 09 palette.
  NOTE: never use a double hyphen inside this comment; <img> decodes SVG as
  strict XML and a double hyphen in a comment corrupts the whole asset.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480" role="img" aria-label="Mel Pino">
  <defs>
    <radialGradient id="poster-vignette" cx="50%" cy="50%" r="72%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55" />
    </radialGradient>
    <!-- The faintest ambient lift toward the off-frame origin side, matching
         the rest-state haze layer (subtle, nothing like a flash). -->
    <radialGradient id="poster-haze" cx="30%" cy="52%" r="55%">
      <stop offset="0%" stop-color="#F4F4F2" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#F4F4F2" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1280" height="480" fill="#000000" />
  <rect x="0" y="0" width="1280" height="480" fill="url(#poster-haze)" />
  <rect x="0" y="0" width="1280" height="480" fill="url(#poster-vignette)" />
</svg>
