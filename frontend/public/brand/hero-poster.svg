<?xml version="1.0" encoding="UTF-8"?>
<!--
  Static hero poster BACKDROP (docs/design/08-landing-hero.md rungs 1/2/4):
  the first frame that paints, and the reduced-motion / pre-init / low-power
  fallback. Black field, a DIRECTIONAL light spill raking in from the
  off-frame origin just past the LEFT edge at barrel height (Revision 2 --
  no weapon drawn), and a vignette. Revision 6: the lockup itself is NOT in
  this asset anymore -- Hero.tsx overlays the inline Wordmark SVG in every
  mode (correct webfont, no <img>-context font fallback, no double print),
  so this file is pure field art. Strictly the doc 09 palette
  (#000000 / #F4F4F2 / #E8112D).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" role="img" aria-label="Mel Pino">
  <defs>
    <!-- Directional spill: brightest at the left (origin) edge, raking right. -->
    <linearGradient id="poster-spill" x1="0" y1="0" x2="768" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F4F4F2" stop-opacity="0.42" />
      <stop offset="12%" stop-color="#E8112D" stop-opacity="0.34" />
      <stop offset="45%" stop-color="#E8112D" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#E8112D" stop-opacity="0" />
    </linearGradient>
    <!-- Hot core hugging the origin edge at barrel height (y ~ 52%): an
         elongated (anamorphic, ~2.2x wider than tall) streak with an
         inverse-square-ish falloff, plus a one-beat red rim just outside the
         hot centre (Revision 3). -->
    <radialGradient id="poster-core" cx="0%" cy="52%" r="30%"
      gradientTransform="translate(0 0.364) scale(1 0.3)">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85" />
      <stop offset="12%" stop-color="#F8F6F0" stop-opacity="0.5" />
      <stop offset="30%" stop-color="#E8112D" stop-opacity="0.3" />
      <stop offset="60%" stop-color="#E8112D" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#E8112D" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="poster-vignette" cx="50%" cy="50%" r="72%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55" />
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1280" height="480" fill="#000000" />
  <rect x="0" y="0" width="1280" height="480" fill="url(#poster-spill)" />
  <rect x="0" y="0" width="1280" height="480" fill="url(#poster-core)" />
  <rect x="0" y="0" width="1280" height="480" fill="url(#poster-vignette)" />
</svg>
