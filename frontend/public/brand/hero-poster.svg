<?xml version="1.0" encoding="UTF-8"?>
<!--
  Static hero poster (docs/design/08-landing-hero.md rungs 1/2/4): the
  first frame that paints, and the reduced-motion / pre-init / low-power
  fallback. Black field, a faint red muzzle bloom, the whole MEL PINO
  lockup. Strictly the doc 09 palette (#000000 / #F4F4F2 / #E8112D).
  PLACEHOLDER glyphs pending the traced asset -- see README.md.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" role="img" aria-label="Mel Pino">
  <defs>
    <radialGradient id="poster-bloom" cx="34%" cy="52%" r="42%">
      <stop offset="0%" stop-color="#E8112D" stop-opacity="0.55" />
      <stop offset="45%" stop-color="#E8112D" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#E8112D" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1280" height="480" fill="#000000" />
  <rect x="0" y="0" width="1280" height="480" fill="url(#poster-bloom)" />
  <g transform="translate(280 300) skewX(-9)">
    <text
      x="0"
      y="0"
      font-family="'Barlow Condensed', sans-serif"
      font-weight="800"
      font-style="italic"
      font-size="180"
      letter-spacing="-6"
      fill="#E8112D"
    >MEL</text>
    <text
      x="300"
      y="0"
      font-family="'Barlow Condensed', sans-serif"
      font-weight="800"
      font-style="italic"
      font-size="180"
      letter-spacing="-6"
      fill="#F4F4F2"
    >PINO</text>
  </g>
</svg>
